<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Gallery</title>
<style>
body {
  margin: 0;
  font-family: 'Fredoka One', sans-serif;
  background-color: #313131;
  background-image: radial-gradient(rgba(255,255,255,0.17) 2px, transparent 0);
  background-size: 30px 30px;
  color: white;
}
header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  font-size: 1.8rem;
}
.back-btn {
  padding: 0.5rem 0.8rem;
  background: #444;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
.back-btn:hover {
  background: #666;
}
.player-title {
  flex: 1;
  text-align: center;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1rem;
  padding: 1rem;
}
.card {
  background: #000;
  border: 2px solid #444;
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}
.decal-img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #555;
}
.copy-btn {
  margin-top: 0.6rem;
  padding: 0.4rem 0.8rem;
  background: #00a3fe;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
.copy-btn:hover {
  background: #0077c2;
}
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">Back</button>
  <div class="player-title" id="playerName">Loading...</div>
</header>

<div class="container" id="stickerContainer">
  <!-- Stickers loaded here -->
</div>

<script>
function getPlayerFromURL() {
  return new URLSearchParams(window.location.search).get("player") || "";
}

async function loadStickers(player) {
  try {
    const res = await fetch(`/api/upload?player=${encodeURIComponent(player)}`);
    return await res.json();
  } catch (e) {
    console.error("Failed to load stickers", e);
    return [];
  }
}

function renderStickers(stickerList) {
  const container = document.getElementById("stickerContainer");
  container.innerHTML = "";

  stickerList.forEach(entry => {
    entry.ids.forEach(id => {
      const card = document.createElement("div");
      card.className = "card";
      const url = `https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=150&height=150&format=png`;
      card.innerHTML = `
        <img class="decal-img" src="${url}" alt="${id}">
        <div>${id}</div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText('${id}')">Copy ID</button>
      `;
      container.appendChild(card);
    });
  });
}

(async () => {
  const player = getPlayerFromURL();
  document.getElementById("playerName").textContent = player;

  const stickerList = await loadStickers(player);
  renderStickers(stickerList);
})();
</script>
</body>
</html>
