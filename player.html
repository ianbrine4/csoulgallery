<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Fredoka One', cursive;
  background: #313131;
  background-image: radial-gradient(rgba(255, 255, 255, 0.171) 2px, transparent 0);
  background-size: 30px 30px;
  background-position: -5px -5px;
  color: white;
}
header {
  text-align: center;
  font-size: 2rem;
  margin: 1rem 0;
}
.player-name {
  text-align:center;
  font-size:1.5rem;
  margin-bottom:1rem;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1rem;
  padding:1rem;
  justify-items:center;
}
.card {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.5rem;
  padding: 1rem;
  width: 14rem;
  height: auto;
  background-color: black;
  border-radius: 0.5rem;
  position: relative;
}
.card .rectangle { position:absolute; width:0.925rem; aspect-ratio:1/1; background-color:white; opacity:0; box-shadow:0 0 0 0.175rem black; }
.card:hover .rectangle { opacity:1; }
.card .rectangle.left-top { top:-0.25rem; left:-0.25rem; }
.card .rectangle.right-top { top:-0.25rem; right:-0.25rem; }
.card .rectangle.left-bottom { bottom:-0.25rem; left:-0.25rem; }
.card .rectangle.right-bottom { bottom:-0.25rem; right:-0.25rem; }
.card .image { width:100%; height:100px; background-color:#fda8ff; display:flex;justify-content:center;align-items:center; border-radius:0.25rem; }
.card .action { padding:0.375rem; margin-top:0.5rem; background-color:#bbefff; font-size:0.75rem; font-weight:700; color:black; border-radius:0.5rem; text-align:center; cursor:pointer; }
.card .action:hover { border: 2px solid #00a3fe; }
</style>
</head>
<body>
<header>CSoul Gallery</header>
<div class="player-name" id="playerName"></div>
<div class="gallery" id="gallery"></div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const player = urlParams.get('player') || "Unknown";

document.getElementById('playerName').textContent = player;

const stickers = [
  "https://via.placeholder.com/100/FF0000",
  "https://via.placeholder.com/100/00FF00",
  "https://via.placeholder.com/100/0000FF"
];

const gallery = document.getElementById('gallery');
stickers.forEach(sticker => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="rectangle left-top"></div>
    <div class="rectangle right-top"></div>
    <div class="rectangle left-bottom"></div>
    <div class="rectangle right-bottom"></div>
    <div class="image"><img src="${sticker}" width="80"></div>
    <div class="action" onclick="copySticker('${sticker}')">Copy</div>
  `;
  gallery.appendChild(card);
});

function copySticker(url) {
  navigator.clipboard.writeText(url);
  alert("Copied Sticker URL!");
}
</script>
</body>
</html>
