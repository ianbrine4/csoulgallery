<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Stickers</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1 id="playerName" style="color:white;font-family:Fredoka One;text-align:center;">Player</h1>
  </header>
  <main id="stickerList" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1rem; padding:1rem;"></main>
</div>
<script>
const apiUrl = "/api/data"
const urlParams = new URLSearchParams(window.location.search)
const player = urlParams.get("player")
document.getElementById("playerName").innerText = player

async function loadStickers() {
  const res = await fetch(apiUrl)
  const data = await res.json()
  const list = document.getElementById("stickerList")
  list.innerHTML=""
  const stickers = data.stickers[player] || []
  if(stickers.length===0){ alert("No stickers found for "+player); return; }
  stickers.forEach(s=>{
    const div = document.createElement("div")
    div.className="card"
    div.innerHTML=`
      <div class="rectangle left-top"></div>
      <div class="rectangle right-top"></div>
      <div class="rectangle left-bottom"></div>
      <div class="rectangle right-bottom"></div>
      <div class="image"><img src="${s.img}" style="width:100%;height:100%;border-radius:0.25rem;"></div>
      <div class="title">${s.id}</div>
      <div class="action" onclick="navigator.clipboard.writeText('${s.id}')">Copy ID</div>
    `
    list.appendChild(div)
  })
}

loadStickers()
</script>
</body>
</html>
