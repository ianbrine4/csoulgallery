<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1 id="title"></h1>
</header>

<main id="grid" class="container"></main>

<script>
const params = new URLSearchParams(location.search)
const name = params.get("name")
document.getElementById("title").innerText = name + " Gallery"

async function load() {
  const res = await fetch("/api/player?name=" + name)
  const data = await res.json()

  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  if (!data || data.length === 0) {
    grid.innerHTML = "<p style='color:white;text-align:center'>No sticker try finding new one</p>"
    return
  }

  data.forEach(id => {
    const el = document.createElement("div")
    el.className = "card"
    el.innerHTML = `
      <div class="image">
        <img src="https://www.roblox.com/asset/?id=${id}">
      </div>
      <div class="title">${id}</div>
      <button class="action" onclick="copy('${id}')">Copy</button>
    `
    grid.appendChild(el)
  })
}

function copy(id){
  navigator.clipboard.writeText(id)
  alert("Copied: " + id)
}

load()
</script>

</body>
</html>
