<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSOUL | Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="obsidian-bg">
    <nav class="nav-glass">
        <div class="nav-content">
            <div class="logo">CSOUL<span>LIBRARY</span></div>
            <div class="search-wrap">
                <i data-lucide="search"></i>
                <input type="text" id="pSearch" oninput="searchLibrary()" placeholder="Search library...">
            </div>
        </div>
    </nav>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-new" onclick="loadGallery('new')">
            <i data-lucide="clock"></i> NEWEST RELEASES
        </button>
        <button class="tab-btn" id="tab-popular" onclick="loadGallery('popular')">
            <i data-lucide="flame"></i> TRENDING
        </button>
    </div>

    <main class="container">
        <!-- Newest Releases Section -->
        <h2 class="section-label">LATEST STICKER SETS</h2>
        <div class="grid" id="main-grid"></div>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
