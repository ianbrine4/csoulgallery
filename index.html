<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSOUL GALLERY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-main">
    <div class="glow-top"></div>
    <header class="header">
        <h1 class="logo">CSOUL<span>GALLERY</span></h1>

            <input type="text" id="pSearch" placeholder="Search Player Username">
            <button onclick="search()">SEARCH</button>
        </div>
    </header>
    <main class="wrapper">
        <div class="auto-grid" id="player-grid"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
