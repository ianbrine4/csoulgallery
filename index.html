<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSoul Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide@0.259.0/dist/lucide.min.css">
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Fredoka One', cursive;
  background: #313131;
  background-image: radial-gradient(rgba(255, 255, 255, 0.171) 2px, transparent 0);
  background-size: 30px 30px;
  background-position: -5px -5px;
  color: white;
}
header {
  text-align: center;
  font-size: 2rem;
  margin: 1rem 0;
}
.search-bar {
  display: flex;
  justify-content: center;
  margin-bottom: 1rem;
}
.search-bar input {
  padding: 0.5rem;
  border-radius: 0.5rem;
  border: none;
  width: 300px;
  font-size: 1rem;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  padding: 1rem;
  justify-items: center;
}
.card {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.75rem;
  padding: 1rem;
  width: 14rem;
  height: auto;
  background-color: black;
  border-radius: 0.5rem;
  position: relative;
}
.card .rectangle {
  position: absolute;
  width: 0.925rem;
  aspect-ratio: 1/1;
  background-color: white;
  opacity: 0;
  box-shadow: 0 0 0 0.175rem black;
}
.card:hover .rectangle { opacity: 1; }
.card .rectangle.left-top { top: -0.25rem; left: -0.25rem; }
.card .rectangle.right-top { top: -0.25rem; right: -0.25rem; }
.card .rectangle.left-bottom { bottom: -0.25rem; left: -0.25rem; }
.card .rectangle.right-bottom { bottom: -0.25rem; right: -0.25rem; }
.card .image { width: 100%; height: 7.25rem; background-color: #fda8ff; border-radius: 0.25rem; display:flex;justify-content:center;align-items:center; }
.card .title { font-size: 1.25rem; font-weight:bold; text-align:center; color:white; }
.card .action { padding:0.375rem; margin-top:0.75rem; background-color:#bbefff; font-size:0.75rem; font-weight:700; color:black; border-radius:0.5rem; text-align:center; cursor:pointer; }
.card .action:hover { border: 2px solid #00a3fe; }
</style>
</head>
<body>
<header>CSoul Gallery</header>
<div class="search-bar">
  <input type="text" id="search" placeholder="Search player...">
</div>
<div class="gallery" id="gallery"></div>

<script>
const players = [
  { name: "Player1", avatar: "https://via.placeholder.com/100", stolenCount: 2 },
  { name: "Player2", avatar: "https://via.placeholder.com/100", stolenCount: 1 },
  { name: "Player3", avatar: "https://via.placeholder.com/100", stolenCount: 4 },
];

function renderGallery(filter="") {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = "";
  const filtered = players.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  filtered.forEach(player => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="rectangle left-top"></div>
      <div class="rectangle right-top"></div>
      <div class="rectangle left-bottom"></div>
      <div class="rectangle right-bottom"></div>
      <div class="image"><img src="${player.avatar}" width="80"></div>
      <div class="title">${player.name}</div>
      <div class="action" onclick="goToPlayer('${player.name}')">Enter</div>
    `;
    gallery.appendChild(card);
  });
}
function goToPlayer(name) {
  window.location.href = `player.html?player=${encodeURIComponent(name)}`;
}
document.getElementById('search').addEventListener('input', e => renderGallery(e.target.value));
renderGallery();
</script>
</body>
</html>
