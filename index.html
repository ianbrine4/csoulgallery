<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSOUL | Library</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-obsidian">
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <i data-lucide="layers" class="red-glow"></i>
                <span>CSOUL<b>LIBRARY</b></span>
            </div>
            <div class="search-wrapper">
                <i data-lucide="search"></i>
                <input type="text" id="pSearch" placeholder="Search library...">
            </div>
        </div>
    </nav>

    <div class="categories">
        <button class="cat-btn active" onclick="loadGallery('new')">
            <i data-lucide="clock"></i> NEW RELEASES
        </button>
        <button class="cat-btn" onclick="loadGallery('popular')">
            <i data-lucide="flame"></i> MOST POPULAR
        </button>
    </div>

    <main class="container">
        <div class="stats-bar">
            <span id="total-count">0 Players Found</span>
        </div>
        <div class="library-grid" id="player-grid"></div>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
