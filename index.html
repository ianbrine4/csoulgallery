<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSoul Gallery</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1 style="color:white;font-family:Fredoka One;text-align:center;">CSoul Gallery</h1>
    <div class="input__container">
      <input type="text" placeholder="Search Player..." class="input__search" id="searchPlayer">
    </div>
  </header>
  <main id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1rem; padding:1rem;">
  </main>
</div>
<script>
const apiUrl = "/api/data"

async function loadPlayers() {
  const res = await fetch(apiUrl)
  const data = await res.json()
  const list = document.getElementById("playerList")
  list.innerHTML = ""
  data.players.forEach(p=>{
    const div = document.createElement("div")
    div.className="card"
    div.innerHTML = `
      <div class="rectangle left-top"></div>
      <div class="rectangle right-top"></div>
      <div class="rectangle left-bottom"></div>
      <div class="rectangle right-bottom"></div>
      <div class="image"><img src="${p.avatar}" style="width:100%;height:100%;border-radius:0.25rem;"></div>
      <div class="title">${p.name}</div>
      <div class="action" onclick="window.location='player.html?player=${p.name}'">Enter</div>
    `
    list.appendChild(div)
  })
}

document.getElementById("searchPlayer").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase()
  document.querySelectorAll(".card .title").forEach(t=>{
    const show = t.innerText.toLowerCase().includes(val)
    t.parentElement.style.display = show?"flex":"none"
  })
})

loadPlayers()
</script>
</body>
</html>
