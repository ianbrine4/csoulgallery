<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSoul Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/lucide/dist/lucide.js"></script>
</head>
<body>
<header>
  <h1>CSoul Gallery</h1>
  <input type="text" id="search" placeholder="Search player..." />
</header>
<main id="gallery" class="container"></main>
<script>
const galleryEl = document.getElementById("gallery")
const searchEl = document.getElementById("search")

async function loadPlayers() {
  const resp = await fetch('/api/players')
  const players = await resp.json()
  galleryEl.innerHTML = ''
  players.forEach(p => {
    const card = document.createElement('div')
    card.className = 'card'
    card.innerHTML = `
      <div class="image"><img src="${p.avatar}" alt="${p.name}" /></div>
      <div class="title">${p.name}</div>
      <div class="action"><a href="player.html?name=${encodeURIComponent(p.name)}">Enter</a></div>
    `
    galleryEl.appendChild(card)
  })
}

searchEl.addEventListener('input', () => {
  const value = searchEl.value.toLowerCase()
  Array.from(galleryEl.children).forEach(c => {
    c.style.display = c.querySelector('.title').textContent.toLowerCase().includes(value) ? '' : 'none'
  })
})

loadPlayers()
</script>
</body>
</html>
