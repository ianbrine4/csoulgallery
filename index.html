<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSoul Gallery</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>CSoul Gallery</h1>
  <input id="search" placeholder="Search player...">
</header>

<main id="grid" class="container"></main>

<script>
const grid = document.getElementById("grid")
const search = document.getElementById("search")

async function load() {
  const res = await fetch("/api/players")
  const data = await res.json()

  grid.innerHTML = ""

  data.forEach(p => {
    const el = document.createElement("div")
    el.className = "card"
    el.innerHTML = `
      <div class="image">
        <img src="${p.avatar}">
      </div>
      <div class="title">${p.name}</div>
      <a class="action" href="/player.html?name=${p.name}">Open</a>
    `
    grid.appendChild(el)
  })
}

search.oninput = () => {
  const val = search.value.toLowerCase()
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(val) ? "" : "none"
  })
}

load()
</script>

</body>
</html>
